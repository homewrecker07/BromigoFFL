<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BromigosFFL — Philadelphia Fantasy Football League (2010–2025)</title>
<style>
:root {
  --bg: #0a0e17; --surface: #131929; --surface2: #1a2236; --border: #2a3454;
  --text: #e2e8f0; --text2: #94a3b8; --accent: #6366f1; --accent2: #818cf8;
  --win: #22c55e; --loss: #ef4444; --tie: #f59e0b; --gold: #fbbf24; --silver: #94a3b8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
a { color: var(--accent2); text-decoration: none; }
.container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

.header { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); padding: 40px 0 28px; border-bottom: 1px solid var(--border); }
.header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.02em; }
.header h1 span { color: var(--accent2); }
.header p { color: var(--text2); font-size: 1rem; margin-top: 6px; }

.tabs { display: flex; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; overflow-x: auto; }
.tab-btn { padding: 12px 20px; color: var(--text2); font-size: 0.85rem; font-weight: 600; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.2s; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent); background: rgba(99,102,241,0.05); }
.tab-panel { display: none; padding: 32px 0; }
.tab-panel.active { display: block; }

h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; margin-top: 24px; }
.desc { color: var(--text2); margin-bottom: 20px; font-size: 0.9rem; }

.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
.grid-3 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
.grid-4 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.card h3 { color: var(--accent2); margin-top: 0; }
.stat { font-size: 2.2rem; font-weight: 800; line-height: 1.1; }
.stat-label { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
th { background: var(--surface2); color: var(--text2); font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.05em; padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
td { padding: 6px 10px; border-bottom: 1px solid var(--border); }
tr:hover td { background: var(--surface2); }
.w { color: var(--win); font-weight: 600; }
.l { color: var(--loss); font-weight: 600; }
.champ { color: var(--gold); font-weight: 700; }
.rank1 td { background: rgba(251, 191, 36, 0.06); }

select { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-size: 0.85rem; cursor: pointer; }
select:focus { outline: 1px solid var(--accent); }
.filter-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }

.scroll-table { max-height: 500px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; }

.bar-chart { display: flex; flex-direction: column; gap: 5px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label { width: 110px; text-align: right; font-size: 0.78rem; color: var(--text2); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 22px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 6px; font-size: 0.68rem; font-weight: 600; color: white; }
.bar-value { font-size: 0.78rem; min-width: 44px; text-align: right; }

.h2h-grid { overflow-x: auto; }
.h2h-grid table { font-size: 0.7rem; }
.h2h-grid td, .h2h-grid th { padding: 3px 5px; text-align: center; }

.timeline { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.year-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; text-align: center; min-width: 72px; cursor: pointer; transition: border-color 0.2s; }
.year-card:hover { border-color: var(--accent); }
.year-card .yr { font-size: 1rem; font-weight: 700; }
.year-card .ch { font-size: 0.7rem; color: var(--gold); margin-top: 2px; }
.year-card.covid { opacity: 0.35; border-style: dashed; }
.year-card.covid .ch { color: var(--text2); }

/* Owner H2H breakdown */
.owner-h2h-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin-top: 12px; }
.owner-h2h-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
.owner-h2h-card .opp { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
.owner-h2h-card .record { font-size: 1.1rem; font-weight: 800; }
.owner-h2h-card .meta { font-size: 0.7rem; color: var(--text2); }

footer { padding: 24px 0; text-align: center; color: var(--text2); font-size: 0.75rem; border-top: 1px solid var(--border); margin-top: 20px; }

@media (max-width: 768px) {
  .header h1 { font-size: 1.6rem; }
  .stat { font-size: 1.8rem; }
  .tab-btn { padding: 10px 14px; font-size: 0.78rem; }
  .bar-label { width: 80px; font-size: 0.7rem; }
}
</style>
</head>
<body>

<div class="header">
  <div class="container">
    <h1>Bromigos<span>FFL</span></h1>
    <p>Philadelphia Fantasy Football League — Est. 2010</p>
  </div>
</div>

<div class="tabs container" id="tabBar"></div>
<div class="container" id="tabContent"></div>

<footer class="container">
  BromigosFFL &bull; Data from <a href="https://docs.google.com/spreadsheets/d/1y1aEqvUtd6qn7v3MpNHGQXKK8xbPgXDQRGH68fWVS2E/edit" target="_blank">Google Sheets</a> &bull; Updated June 2026
</footer>

<script>
const DATA = /*DATA_PLACEHOLDER*/{};

const allYears = [2010,2011,2012,2013,2014,2015,2016,2017,2018,2019,2020,2022,2023,2024,2025];
const owners = Object.keys(DATA.ownerStats).sort((a,b) => DATA.ownerStats[b].wins - DATA.ownerStats[a].wins);
const ownerColors = {};
const palette = ['#6366f1','#22c55e','#f59e0b','#ef4444','#06b6d4','#d946ef','#f97316','#84cc16','#e879f9','#14b8a6','#fb923c'];
owners.forEach((o,i) => ownerColors[o] = palette[i % palette.length]);

function fmt(n,d=1){return typeof n==='number'?n.toFixed(d):'—';}
function pct(w,l){const t=w+l;return t>0?(w/t*100).toFixed(1):'0.0';}
function resolveOwner(team){if(DATA.ownerMap[team])return DATA.ownerMap[team];for(const fullTeam of Object.keys(DATA.ownerMap)){if(team.endsWith('...')&&fullTeam.startsWith(team.slice(0,-3)))return DATA.ownerMap[fullTeam];}return null;}
function el(tag,cls,html,attrs){const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;if(attrs)Object.entries(attrs).forEach(([k,v])=>e[k]=v);return e;}
function makeTable(headers,rows){return `<div class="scroll-table"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${Array.isArray(r)?r.map(c=>`<td>${c}</td>`).join(''):r}</tr>`).join('')}</tbody></table></div>`;}
function statCard(icon,val,label,sub){return `<div class="card"><div style="font-size:1.3rem">${icon}</div><div class="stat">${val}</div><div class="stat-label">${label}</div><div style="font-size:0.7rem;color:var(--text2)">${sub||''}</div></div>`;}

const TABS = [
  {id:'overview', label:'Overview', icon:'📊'},
  {id:'standings', label:'Standings', icon:'🏆'},
  {id:'h2h', label:'Head-to-Head', icon:'⚔️'},
  {id:'rivalries', label:'Rivalries', icon:'🔥'},
  {id:'drafts', label:'Drafts', icon:'📝'},
  {id:'records', label:'Records', icon:'🏅'}
];

const tabBar = document.getElementById('tabBar');
const tabContent = document.getElementById('tabContent');
TABS.forEach((t,i) => {
  const btn = el('button','tab-btn'+(i===0?' active':''), t.icon+' '+t.label);
  btn.onclick = () => switchTab(t.id);
  tabBar.appendChild(btn);
  const panel = el('div','tab-panel'+(i===0?' active':''), '', {id:'panel-'+t.id});
  tabContent.appendChild(panel);
});
function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', TABS[i].id===id));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id==='panel-'+id));
}

// ─── OVERVIEW ───
function renderOverview() {
  const p = document.getElementById('panel-overview');
  const totalMU = DATA.h2h.length;
  const totalPF = DATA.h2h.reduce((s,m)=>s+(m.s||0),0);
  const avgScore = totalPF/totalMU;
  const highScore = Math.max(...DATA.h2h.map(m=>m.s||0));
  const champCount = Object.values(DATA.championships).flat().length;
  const uniqueChamps = Object.keys(DATA.championships).length;

  let html = `<h2>League Overview</h2><p class="desc">15 seasons of Philadelphia fantasy football (2010–2025). 2021 was a COVID off-year.</p>`;
  html += `<div class="grid grid-4">
    ${statCard('📅','15','Seasons','2010–2025')}
    ${statCard('👥',owners.length,'Owners','all-time')}
    ${statCard('⚔️',totalMU.toLocaleString(),'Matchups','all-time')}
    ${statCard('🏆',champCount,'Championships',uniqueChamps+' unique winners')}
  </div>
  <div class="grid grid-4" style="margin-top:12px">
    ${statCard('💯',fmt(avgScore),'Avg Score','per week')}
    ${statCard('🔥',fmt(highScore),'Highest Score','single week')}
    ${statCard('📊',fmt(totalPF/1000,0)+'K','Total Points','all-time')}
    ${statCard('🎯','10','Current Teams','2025 season')}
  </div>`;

  html += `<h3>🏆 Champions</h3><div class="timeline">`;
  allYears.forEach(y => {
    if(y===2021){html+=`<div class="year-card covid"><div class="yr">2021</div><div class="ch">COVID</div></div>`;return;}
    const champ=Object.entries(DATA.championships).find(([o,yrs])=>yrs.includes(y));
    html+=`<div class="year-card"><div class="yr">${y}</div><div class="ch">${champ?champ[0]:'—'}</div></div>`;
  });
  html+=`</div>`;

  html+=`<h3>Total Championships</h3>`;
  const titleOwners=Object.entries(DATA.championships).sort((a,b)=>b[1].length-a[1].length);
  const maxT=titleOwners[0]?titleOwners[0][1].length:1;
  html+=`<div class="bar-chart">`;
  titleOwners.forEach(([o,yrs])=>{html+=`<div class="bar-row"><div class="bar-label">${o}</div><div class="bar-track"><div class="bar-fill" style="width:${yrs.length/maxT*100}%;background:${ownerColors[o]}">${yrs.length}</div></div><div class="bar-value">${yrs.length} 🏆</div></div>`;});
  html+=`</div>`;

  html+=`<h3>Career Wins</h3>`;
  const maxW=Math.max(...owners.map(o=>DATA.ownerStats[o].wins));
  html+=`<div class="bar-chart">`;
  owners.forEach(o=>{const s=DATA.ownerStats[o];html+=`<div class="bar-row"><div class="bar-label">${o}</div><div class="bar-track"><div class="bar-fill" style="width:${s.wins/maxW*100}%;background:${ownerColors[o]}">${s.wins}</div></div><div class="bar-value">${s.wins}-${s.losses}</div></div>`;});
  html+=`</div>`;
  p.innerHTML=html;
}

// ─── STANDINGS ───
function renderStandings() {
  const p=document.getElementById('panel-standings');
  p.innerHTML=`<h2>Standings</h2><p class="desc">Year-by-year final standings.</p>
  <div class="filter-bar"><span>Year:</span><select id="st-year" onchange="updateStandings()">${allYears.map(y=>`<option value="${y}"${y===2025?' selected':''}>${y}</option>`).join('')}</select></div><div id="st-content"></div>`;
  updateStandings();
}
function updateStandings() {
  const yr=parseInt(document.getElementById('st-year').value);
  const el=document.getElementById('st-content');
  if(yr===2021){el.innerHTML='<p>No season in 2021 (COVID).</p>';return;}
  const yd=DATA.standingsByYear[yr];if(!yd){el.innerHTML='<p>No data.</p>';return;}
  const ranked=[...yd].sort((a,b)=>a.rk-b.rk);
  const rows=ranked.map(s=>{const isC=s.rk===1;return `<tr class="${isC?'rank1':''}"><td>${isC?'🏆':s.rk}</td><td>${s.t}</td><td>${s.owner}</td><td class="w">${s.w}</td><td class="l">${s.l}</td><td>${s.t2||0}</td><td>${fmt(s.pf)}</td><td>${fmt(s.pa)}</td><td>${s.st||''}</td></tr>`;});
  let html=makeTable(['Rank','Team','Owner','W','L','T','PF','PA','Streak'],rows);
  html+=`<h3>Points For — ${yr}</h3>`;
  const maxPF=Math.max(...ranked.map(s=>s.pf));
  html+=`<div class="bar-chart">`;
  ranked.forEach(s=>{html+=`<div class="bar-row"><div class="bar-label">${s.owner}</div><div class="bar-track"><div class="bar-fill" style="width:${s.pf/maxPF*100}%;background:${ownerColors[s.owner]||'#6366f1'}"> ${fmt(s.pf)}</div></div></div>`;});
  html+=`</div>`;
  el.innerHTML=html;
}

// ─── H2H ───
function renderH2H() {
  const p=document.getElementById('panel-h2h');
  const h2hOwners=owners;
  const h2hMatrix={};
  h2hOwners.forEach(a=>{h2hMatrix[a]={};h2hOwners.forEach(b=>{if(a!==b){const m=DATA.ownerStats[a]?.matchups[b];if(m)h2hMatrix[a][b]=m.wins-m.losses;}});});

  let html=`<h2>Head-to-Head Matrix</h2><p class="desc">Career H2H win differentials. Green = winning, Red = losing. Values show win differential (e.g. +6 means 6 more wins than losses vs that owner).</p>`;
  html+=`<div class="h2h-grid"><table><thead><tr><th></th>${h2hOwners.map(o=>`<th style="writing-mode:vertical-lr;text-align:left;min-width:32px">${o.split(' ')[0]}</th>`).join('')}</tr></thead><tbody>`;
  h2hOwners.forEach(a=>{
    html+=`<tr><td style="font-weight:600">${a.split(' ')[0]}</td>`;
    h2hOwners.forEach(b=>{
      if(a===b){html+=`<td style="background:var(--surface2)">—</td>`;return;}
      const d=h2hMatrix[a]?.[b];if(d===undefined){html+=`<td>—</td>`;return;}
      const cls=d>0?'color:var(--win)':d<0?'color:var(--loss)':'color:var(--tie)';
      const intensity=Math.min(Math.abs(d)/20,1);
      const bg=d>0?`rgba(34,197,94,${intensity*0.3})`:d<0?`rgba(239,68,68,${intensity*0.3})`:'transparent';
      html+=`<td style="${cls};background:${bg};font-weight:600">${d>0?'+':''}${d}</td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;

  // Per-owner H2H breakdown
  html+=`<h3>Owner vs All</h3><div class="filter-bar"><span>Owner:</span><select id="h2h-owner" onchange="updateOwnerH2H()">${h2hOwners.map(o=>`<option value="${o}">${o}</option>`).join('')}</select></div><div id="h2h-owner-content"></div>`;

  p.innerHTML=html;
  updateOwnerH2H();
}

function updateOwnerH2H() {
  const selected=document.getElementById('h2h-owner').value;
  const el=document.getElementById('h2h-owner-content');
  const matchups=DATA.ownerStats[selected]?.matchups||{};
  const oppEntries=Object.entries(matchups).sort((a,b)=>(b[1].wins-b[1].losses)-(a[1].wins-a[1].losses));

  let html=`<div class="owner-h2h-grid">`;
  oppEntries.forEach(([opp,m])=>{
    const diff=m.wins-m.losses;
    const cls=diff>0?'color:var(--win)':diff<0?'color:var(--loss)':'color:var(--tie)';
    const bg=diff>0?'rgba(34,197,94,0.08)':diff<0?'rgba(239,68,68,0.08)':'transparent';
    const pctVal=pct(m.wins,m.losses);
    html+=`<div class="owner-h2h-card" style="border-left:3px solid ${ownerColors[opp]};background:${bg}">
      <div class="opp" style="color:${ownerColors[opp]}">${opp}</div>
      <div class="record" style="${cls}">${m.wins}-${m.losses}</div>
      <div class="meta">${pctVal}% win · ${diff>0?'+':''}${diff} diff</div>
    </div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
}

// ─── RIVALRIES ───
function renderRivalries() {
  const p=document.getElementById('panel-rivalries');
  const h2hOwners=owners;
  const allMatchups=[];
  h2hOwners.forEach((a,i)=>{
    h2hOwners.forEach((b,j)=>{
      if(j<=i)return;
      const ma=DATA.ownerStats[a]?.matchups[b];
      if(ma&&(ma.wins+ma.losses)>0){
        allMatchups.push({a,b,aW:ma.wins,bW:ma.losses,total:ma.wins+ma.losses,diff:Math.abs(ma.wins-ma.losses)});
      }
    });
  });

  const sortedByGames=[...allMatchups].sort((a,b)=>b.total-a.total);
  const closest=[...allMatchups].filter(m=>m.total>=10).sort((a,b)=>a.diff-b.diff||b.total-a.total);
  const lopsided=[...allMatchups].sort((a,b)=>b.diff-a.diff||b.total-a.total);

  let html=`<h2>Rivalries</h2><p class="desc">Head-to-head breakdowns by category.</p>`;

  // Most played
  html+=`<h3>📊 Most Played Matchups</h3>`;
  const mostPlayedRows=sortedByGames.slice(0,12).map(m=>{
    const ldr=m.aW>=m.bW?m.a:m.b; const trl=m.aW>=m.bW?m.b:m.a;
    const lw=Math.max(m.aW,m.bW); const ll=Math.min(m.aW,m.bW);
    return [`<span style="color:${ownerColors[m.a]}">${m.a}</span> vs <span style="color:${ownerColors[m.b]}">${m.b}</span>`,m.total,`<span class="w">${lw}</span>-<span class="l">${ll}</span>`,m.diff===0?'Tied':`<span style="color:${ownerColors[ldr]}">${ldr}</span> by ${m.diff}`];
  });
  html+=makeTable(['Matchup','Games','Record','Leader'],mostPlayedRows);

  // Closest rivalries
  html+=`<h3>⚖️ Closest Rivalries</h3><p class="desc">Smallest win differential (min 10 games). These could go either way.</p>`;
  const closestRows=closest.slice(0,8).map(m=>{
    return [`<span style="color:${ownerColors[m.a]}">${m.a}</span> vs <span style="color:${ownerColors[m.b]}">${m.b}</span>`,m.total,`${m.aW}-${m.bW}`,m.diff];
  });
  html+=makeTable(['Matchup','Games','Record','Diff'],closestRows);

  // Most lopsided
  html+=`<h3>💀 Most Lopsided</h3><p class="desc">Biggest win differentials. Someone owns someone.</p>`;
  const lopsidedRows=lopsided.slice(0,8).map(m=>{
    const ldr=m.aW>=m.bW?m.a:m.b; const trl=m.aW>=m.bW?m.b:m.a;
    const lw=Math.max(m.aW,m.bW); const ll=Math.min(m.aW,m.bW);
    return [`<span style="color:${ownerColors[ldr]}">${ldr}</span> owns <span style="color:${ownerColors[trl]}">${trl}</span>`,m.total,`${lw}-${ll}`,`+${m.diff}`];
  });
  html+=makeTable(['Dominator → Dominated','Games','Record','Diff'],lopsidedRows);

  p.innerHTML=html;
}

// ─── DRAFTS ───
function renderDrafts() {
  const p=document.getElementById('panel-drafts');
  const rosterSlots={QB:1,RB:2,WR:3,TE:1,K:1,DEF:1};
  const idealByYear={};
  allYears.forEach(yr=>{
    if(yr===2021)return;
    const yd=DATA.drafts.filter(d=>d.yr===yr);
    const byPos={};yd.forEach(d=>{const pos=d.pos||'?';if(!byPos[pos])byPos[pos]=[];byPos[pos].push(d.pts||0);});
    let total=0;Object.entries(rosterSlots).forEach(([pos,count])=>{const players=(byPos[pos]||[]).sort((a,b)=>b-a);for(let i=0;i<count&&i<players.length;i++)total+=players[i];});
    idealByYear[yr]=total;
  });

  const ownerNFLPref={};
  DATA.drafts.forEach(d=>{
    const owner=resolveOwner(d.team);if(!owner||!d.nfl)return;
    if(!ownerNFLPref[owner])ownerNFLPref[owner]={};
    if(!ownerNFLPref[owner][d.nfl])ownerNFLPref[owner][d.nfl]=0;
    ownerNFLPref[owner][d.nfl]++;
  });

  let html=`<h2>Draft History</h2><p class="desc">Draft results and analysis across all seasons.</p>`;

  html+=`<h3>📈 Ideal Roster Score by Year</h3><p class="desc">Sum of top drafted player scores at each starting slot (1 QB, 2 RB, 3 WR, 1 TE, 1 K, 1 DEF).</p>`;
  const idealYears=Object.entries(idealByYear).sort((a,b)=>b[1]-a[1]);
  const maxIdeal=idealYears[0]?idealYears[0][1]:1;
  html+=`<div class="bar-chart">`;
  idealYears.forEach(([yr,total])=>{html+=`<div class="bar-row"><div class="bar-label">${yr}</div><div class="bar-track"><div class="bar-fill" style="width:${total/maxIdeal*100}%;background:var(--accent)">${fmt(total,0)}</div></div><div class="bar-value">${fmt(total,0)}</div></div>`;});
  html+=`</div>`;

  html+=`<h3>🏈 Owner NFL Team Preferences</h3><p class="desc">Most-drafted NFL teams per owner (all years combined). Shows draft tendencies.</p>`;
  html+=`<div class="grid grid-2">`;
  owners.forEach(o=>{
    const prefs=ownerNFLPref[o];if(!prefs)return;
    const sorted=Object.entries(prefs).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const totalDrafts=Object.values(prefs).reduce((s,v)=>s+v,0);
    html+=`<div class="card"><h3>${o}</h3><div style="font-size:0.8rem">`;
    sorted.forEach(([nfl,cnt])=>{
      const pctVal=(cnt/totalDrafts*100).toFixed(0);
      html+=`<div class="bar-row"><div class="bar-label" style="width:40px">${nfl}</div><div class="bar-track"><div class="bar-fill" style="width:${pctVal}%;background:${ownerColors[o]}">${cnt}</div></div><div class="bar-value">${pctVal}%</div></div>`;
    });
    html+=`</div></div>`;
  });
  html+=`</div>`;

  // Avg round of FIRST pick at each position per owner
  // For each owner+year, find the round they drafted their first player at each position
  // Then average those first-pick rounds across all years
  const posList=['QB','RB','WR','TE','K','DEF'];
  const validOwners=new Set(Object.keys(DATA.ownerStats));
  const ownerFirstPick={};
  DATA.drafts.forEach(d=>{
    const owner=resolveOwner(d.team);if(!owner||!validOwners.has(owner)||!d.pos||!d.pick||!d.yr)return;
    const parts=String(d.pick).split('.');const round=parts.length>=1?parseInt(parts[0]):null;if(round===null)return;
    if(!ownerFirstPick[owner])ownerFirstPick[owner]={};
    if(!ownerFirstPick[owner][d.yr])ownerFirstPick[owner][d.yr]={};
    const yd=ownerFirstPick[owner][d.yr];
    if(!yd[d.pos]||round<yd[d.pos])yd[d.pos]=round; // keep earliest round per pos per year
  });
  const ownerAvgFirstRound={};
  Object.entries(ownerFirstPick).forEach(([owner,years])=>{
    ownerAvgFirstRound[owner]={};
    posList.forEach(pos=>{
      const rounds=[];Object.values(years).forEach(yd=>{if(yd[pos])rounds.push(yd[pos]);});
      if(rounds.length>0)ownerAvgFirstRound[owner][pos]={avg:rounds.reduce((a,b)=>a+b,0)/rounds.length,count:rounds.length};
    });
  });

  html+=`<h3>🎯 Avg Round of First Position Pick</h3><p class="desc">What round does each owner typically draft their first QB, RB, WR, TE, K, DEF? Shows draft strategy &mdash; lower rounds = higher priority for that position.</p>`;
  const draftRoundOwners=Object.keys(ownerAvgFirstRound).sort();
  const activePos=posList.filter(pos=>draftRoundOwners.some(o=>ownerAvgFirstRound[o]?.[pos]));
  const drRows=draftRoundOwners.map(o=>{
    const posCells=activePos.map(pos=>{
      const d=ownerAvgFirstRound[o]?.[pos];
      if(!d)return '—';
      const avg=d.avg.toFixed(1);
      // Color: earlier rounds (1-3) = green, middle (4-8) = neutral, late (9+) = red
      const normalized=d.avg/14;
      const bg=normalized<0.25?`rgba(34,197,94,${0.35-normalized})`:normalized>0.6?`rgba(239,68,68,${normalized-0.6})`:'transparent';
      return `<span style="background:${bg};padding:2px 4px;border-radius:3px">${avg}</span> <span style="font-size:0.65rem;color:var(--text2)">(${d.count}y)</span>`;
    });
    return [`<span style="color:${ownerColors[o]||'#999'};font-weight:600">${o}</span>`,...posCells];
  });
  html+=makeTable(['Owner',...activePos],drRows);

  html+=`<h3>Draft Picks</h3><div class="filter-bar"><span>Year:</span><select id="draft-year" onchange="updateDrafts()">${allYears.filter(y=>y!==2021).map(y=>`<option value="${y}"${y===2025?' selected':''}>${y}</option>`).join('')}</select></div><div id="draft-content"></div>`;
  p.innerHTML=html;
  updateDrafts();
}
function updateDrafts() {
  const yr=parseInt(document.getElementById('draft-year').value);
  const el=document.getElementById('draft-content');
  const yd=DATA.drafts.filter(d=>d.yr===yr);
  if(!yd.length){el.innerHTML='<p>No data.</p>';return;}
  const rows=yd.map(d=>[d.pick,d.player,d.pos||'',d.nfl||'',d.team,resolveOwner(d.team)||d.team,d.pts?fmt(d.pts):'—']);
  el.innerHTML=makeTable(['Pick','Player','Pos','NFL','Team','Owner','Pts'],rows);
}

// ─── RECORDS ───
function renderRecords() {
  const p=document.getElementById('panel-records');
  let html=`<h2>All-Time Records</h2><p class="desc">Career stats, streaks, and extremes across all 15 seasons.</p>`;

  html+=`<h3>Career Standings</h3>`;
  const careerRows=owners.map(o=>{
    const s=DATA.ownerStats[o];const total=s.wins+s.losses;const wpct=pct(s.wins,s.losses);
    const avgPF=total>0?s.pf/total:0;const avgPA=total>0?s.pa/total:0;
    const titles=DATA.championships[o]?DATA.championships[o].length:0;
    return [`<span style="color:${ownerColors[o]};font-weight:600">${o}</span>`,`<span class="w">${s.wins}</span>`,`<span class="l">${s.losses}</span>`,total,wpct+'%',fmt(avgPF),fmt(avgPA),titles>0?'🏆×'+titles:'—'];
  });
  html+=makeTable(['Owner','W','L','Games','Win%','Avg PF','Avg PA','Titles'],careerRows);

  html+=`<h3>📈 Single-Season Records</h3>`;
  const seasonRecs=[];
  allYears.forEach(y=>{if(y===2021)return;const ys=DATA.standingsByYear[y];if(!ys)return;ys.forEach(s=>seasonRecs.push({year:y,owner:s.owner,team:s.t,w:s.w,l:s.l,pf:s.pf,pa:s.pa}));});
  const bestW=seasonRecs.reduce((a,b)=>a.w>b.w?a:b);
  const worstL=seasonRecs.reduce((a,b)=>a.l>b.l?a:b);
  const bestPF=seasonRecs.reduce((a,b)=>a.pf>b.pf?a:b);
  const worstPF=seasonRecs.reduce((a,b)=>a.pf<b.pf?a:b);

  html+=`<div class="grid grid-2">
    <div class="card"><h3>Most Wins</h3><div class="stat w">${bestW.w}</div><div class="stat-label">${bestW.owner} — ${bestW.year} (${bestW.team})</div></div>
    <div class="card"><h3>Most Losses</h3><div class="stat l">${worstL.l}</div><div class="stat-label">${worstL.owner} — ${worstL.year} (${worstL.team})</div></div>
    <div class="card"><h3>Highest PF</h3><div class="stat" style="color:var(--win)">${fmt(bestPF.pf)}</div><div class="stat-label">${bestPF.owner} — ${bestPF.year} (${bestPF.team})</div></div>
    <div class="card"><h3>Lowest PF</h3><div class="stat" style="color:var(--loss)">${fmt(worstPF.pf)}</div><div class="stat-label">${worstPF.owner} — ${worstPF.year} (${worstPF.team})</div></div>
  </div>`;

  html+=`<h3>💥 Single-Week Records</h3>`;
  const bestWeek=DATA.h2h.reduce((a,b)=>(b.s||0)>(a.s||0)?b:a);
  const worstWeek=DATA.h2h.reduce((a,b)=>(b.s||0)<(a.s||0)?b:a);
  const blowout=DATA.h2h.reduce((a,b)=>Math.abs((b.s||0)-(b.os||0))>Math.abs((a.s||0)-(a.os||0))?b:a);

  html+=`<div class="grid grid-3">
    <div class="card"><h3>Highest Score</h3><div class="stat" style="color:var(--win)">${fmt(bestWeek.s)}</div><div class="stat-label">${bestWeek.on} — Wk ${bestWeek.w}, ${bestWeek.y}</div></div>
    <div class="card"><h3>Lowest Score</h3><div class="stat" style="color:var(--loss)">${fmt(worstWeek.s)}</div><div class="stat-label">${worstWeek.on} — Wk ${worstWeek.w}, ${worstWeek.y}</div></div>
    <div class="card"><h3>Biggest Blowout</h3><div class="stat" style="color:var(--accent2)">${fmt(Math.abs(blowout.s-blowout.os))}</div><div class="stat-label">${blowout.on} over ${blowout.oon} — Wk ${blowout.w}, ${blowout.y}</div></div>
  </div>`;

  html+=`<h3>🔥 Best/Worst Streaks</h3>`;
  const streaks={};owners.forEach(o=>streaks[o]={best:0,worst:0});
  owners.forEach(o=>{
    const games=DATA.h2h.filter(m=>m.on===o).sort((a,b)=>a.y-b.y||a.w-b.w).map(m=>m.r==='Win'?1:-1);
    let cw=0,cl=0,mw=0,ml=0;
    games.forEach(g=>{if(g===1){cw++;cl=0;mw=Math.max(mw,cw)}else{cl++;cw=0;ml=Math.max(ml,cl)}});
    streaks[o].best=mw;streaks[o].worst=ml;
  });
  const streakRows=owners.map(o=>[`<span style="color:${ownerColors[o]};font-weight:600">${o}</span>`,`<span class="w">${streaks[o].best}</span>`,`<span class="l">${streaks[o].worst}</span>`]);
  html+=makeTable(['Owner','Best Win Streak','Worst Loss Streak'],streakRows);

  p.innerHTML=html;
}

renderOverview();renderStandings();renderH2H();renderRivalries();renderDrafts();renderRecords();
window.updateStandings=updateStandings;window.updateDrafts=updateDrafts;window.updateOwnerH2H=updateOwnerH2H;
</script>
