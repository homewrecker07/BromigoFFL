<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BromigosFFL — Philadelphia Fantasy Football League (2010–2025)</title>
<style>
:root {
  --bg: #0a0e17; --surface: #131929; --surface2: #1a2236; --border: #2a3454;
  --text: #e2e8f0; --text2: #94a3b8; --accent: #6366f1; --accent2: #818cf8;
  --win: #22c55e; --loss: #ef4444; --tie: #f59e0b; --gold: #fbbf24; --silver: #94a3b8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
a { color: var(--accent2); text-decoration: none; }
.container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

/* Header */
.header { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); padding: 48px 0 36px; border-bottom: 1px solid var(--border); }
.header h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em; }
.header h1 span { color: var(--accent2); }
.header p { color: var(--text2); font-size: 1.1rem; margin-top: 8px; }
.header .subtitle { color: var(--gold); font-size: 0.9rem; font-weight: 600; margin-top: 4px; }

/* Nav */
nav { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
nav .container { display: flex; gap: 0; overflow-x: auto; }
nav a { padding: 12px 20px; color: var(--text2); font-size: 0.9rem; font-weight: 500; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.2s; }
nav a:hover, nav a.active { color: var(--text); border-bottom-color: var(--accent); }

/* Sections */
section { padding: 48px 0; }
section + section { border-top: 1px solid var(--border); }
h2 { font-size: 1.75rem; font-weight: 700; margin-bottom: 8px; }
h3 { font-size: 1.25rem; font-weight: 600; margin-bottom: 12px; }
.section-desc { color: var(--text2); margin-bottom: 24px; }

/* Grid */
.grid { display: grid; gap: 20px; }
.grid-2 { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
.grid-3 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
.grid-4 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.card.highlight { border-color: var(--accent); background: linear-gradient(135deg, var(--surface) 0%, #1e1b4b 100%); }
.card h3 { font-size: 1.1rem; color: var(--accent2); margin-bottom: 8px; }
.stat { font-size: 2.5rem; font-weight: 800; line-height: 1.1; }
.stat-label { font-size: 0.8rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }

/* Tables */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th { background: var(--surface2); color: var(--text2); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
tr:hover td { background: var(--surface2); }
.w { color: var(--win); font-weight: 600; }
.l { color: var(--loss); font-weight: 600; }
.champ { color: var(--gold); }
.rank1 { background: rgba(251, 191, 36, 0.08); }

/* Owner avatar/badge */
.owner-badge { display: inline-flex; align-items: center; gap: 8px; }
.owner-dot { width: 10px; height: 10px; border-radius: 50%; }

/* Charts */
.bar-chart { display: flex; flex-direction: column; gap: 6px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label { width: 100px; text-align: right; font-size: 0.8rem; color: var(--text2); flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 24px; background: var(--surface2); border-radius: 4px; overflow: hidden; display: flex; }
.bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-size: 0.7rem; font-weight: 600; color: white; min-width: 30px; }
.bar-value { font-size: 0.8rem; min-width: 44px; text-align: right; }

/* Timeline */
.timeline { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
.year-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; text-align: center; min-width: 80px; }
.year-card .year { font-size: 1.2rem; font-weight: 700; }
.year-card .champ-name { font-size: 0.75rem; color: var(--gold); margin-top: 4px; }
.year-card.covid { opacity: 0.4; border-style: dashed; }
.year-card.covid .champ-name { color: var(--text2); }

/* H2H Grid */
.h2h-grid { overflow-x: auto; }
.h2h-grid table { font-size: 0.75rem; }
.h2h-grid td, .h2h-grid th { padding: 4px 6px; text-align: center; }
.h2h-cell { font-weight: 600; }
.h2h-cell.pos { color: var(--win); }
.h2h-cell.neg { color: var(--loss); }
.h2h-cell.even { color: var(--tie); }

/* Filter/Select */
select, .year-btn { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-size: 0.85rem; cursor: pointer; }
select:focus { outline: 1px solid var(--accent); }
.filter-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.year-btn { padding: 6px 14px; }
.year-btn.active { background: var(--accent); border-color: var(--accent); }
.year-btn:hover { border-color: var(--accent2); }

/* Scrollable table */
.scroll-table { max-height: 600px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; }

/* Trophy */
.trophy { font-size: 1.5rem; }

/* Footer */
footer { padding: 32px 0; text-align: center; color: var(--text2); font-size: 0.8rem; border-top: 1px solid var(--border); }

@media (max-width: 768px) {
  .header h1 { font-size: 1.8rem; }
  .stat { font-size: 2rem; }
  nav a { padding: 10px 14px; font-size: 0.8rem; }
}
</style>
</head>

function el(tag, cls, html, attrs) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html) e.innerHTML = html;
  if (attrs) Object.entries(attrs).forEach(([k,v]) => e[k] = v);

function renderOverview() {
  const sec = document.getElementById('overview');
  sec.innerHTML = '';

  const wrap = el('section');
  wrap.appendChild(el('h2', '', 'League Overview'));
  wrap.appendChild(el('p', 'section-desc', '15 seasons of Philadelphia fantasy football — from 8 teams in 2010 to 10 teams today. 2021 was a COVID off-year.'));

  // Stats cards
  const totalMatchups = DATA.h2h.length;
  const totalPoints = DATA.h2h.reduce((s,m) => s + (m.s||0), 0);
  const avgScore = totalPoints / totalMatchups;
  const highestScore = Math.max(...DATA.h2h.map(m => m.s||0));

  const grid = el('div', 'grid grid-4');
  grid.appendChild(makeStatCard('📅', '15', 'Seasons Played', '(2010–2025)'));
  grid.appendChild(makeStatCard('👥', '11', 'All-Time Owners', '9 currently active'));
  grid.appendChild(makeStatCard('⚔️', totalMatchups.toLocaleString(), 'Matchups Played', 'all-time'));
  grid.appendChild(makeStatCard('🏆', Object.values(DATA.championships).flat().length, 'Championships Awarded', '6 unique winners'));

  const grid2 = el('div', 'grid grid-4', '', {style: 'margin-top:16px'});
  grid2.appendChild(makeStatCard('💯', fmt(avgScore), 'Avg Weekly Score', 'all-time'));
  grid2.appendChild(makeStatCard('🔥', fmt(highestScore), 'Highest Score', 'single week'));
  grid2.appendChild(makeStatCard('📊', fmt(totalPoints/1000,0) + 'K', 'Total Points Scored', 'all-time'));
  grid2.appendChild(makeStatCard('🎯', '10', 'Current Teams', '2025 season'));

  wrap.appendChild(grid);
  wrap.appendChild(grid2);

  // Career standings bar chart
  wrap.appendChild(el('h3', '', 'Career Win_totals', {style: 'margin-top:32px'}));
  const chart = el('div', 'bar-chart');
  const maxW = Math.max(...owners.map(o => DATA.ownerStats[o].wins));
  owners.forEach(o => {
    const s = DATA.ownerStats[o];
    const titles = DATA.championships[o] ? ' 🏆×' + DATA.championships[o].length : '';
    const row = el('div', 'bar-row');
    row.appendChild(el('div', 'bar-label', o + titles));
    const track = el('div', 'bar-track');
    const fill = el('div', 'bar-fill', '', {style: `width:${s.wins/maxW*100}%; background:${ownerColors[o]}`});
    fill.textContent = s.wins;
    track.appendChild(fill);
    row.appendChild(track);
    row.appendChild(el('div', 'bar-value', s.wins + '-' + s.losses));
    chart.appendChild(row);
  });
  wrap.appendChild(chart);

  // Championship table
  wrap.appendChild(el('h3', '', '🏆 Championship History', {style: 'margin-top:32px'}));
  const champArr = [];

      DATA.championships[o].forEach(y => champArr.push({owner: o, year: y}));

  });
  champArr.sort((a,b) => a.year - b.year);

  ]));

  sec.appendChild(wrap);
}

function makeStatCard(icon, value, label, sub) {
  const c = el('div', 'card');
  c.innerHTML = `<div style="font-size:1.5rem">${icon}</div><div class="stat">${value}</div><div class="stat-label">${label}</div><div style="font-size:0.75rem;color:var(--text2)">${sub||''}</div>`;
  return c;
}

// ─── STANDINGS ───

  wrap.appendChild(el('h2', '', '📊 Standings'));

  // Determine sorted order: by wins desc, then PF desc

  });

  const tw = el('div', 'scroll-table');
  tw.innerHTML = `<table><thead><tr><th>Rank</th><th>Team</th><th>Owner</th><th>W</th><th>L</th><th>T</th><th>PF</th><th>PA</th><th>Streak</th></tr></thead><tbody>${rows.join('')}</tbody></table>`;
  wrap.appendChild(tw);

  // PF bar chart sorted by rank
  const byRank = [...sorted].sort((a,b) => a.rk - b.rk);
  wrap.appendChild(el('h3', '', 'Points For — ' + year, {style: 'margin-top:24px'}));
  const maxPF = Math.max(...byRank.map(s => s.pf));
  const chart = el('div', 'bar-chart');
  byRank.forEach(s => {
    const row = el('div', 'bar-row');
    row.appendChild(el('div', 'bar-label', s.owner));
    const track = el('div', 'bar-track');

// ─── HEAD-TO-HEAD ───
function renderH2H() {
  const sec = document.getElementById('h2h');
  sec.innerHTML = '';
  const wrap = el('section');
  wrap.appendChild(el('h2', '', '⚔️ Head-to-Head Records'));
  wrap.appendChild(el('p', 'section-desc', 'Career head-to-head win differentials between all owners. Green = winning record, Red = losing record.'));

  // Build H2H matrix
  const h2hOwners = owners.filter(o => o !== 'Mercede Tran'); // exclude limited data owner
  const h2hMatrix = {};
  h2hOwners.forEach(a => {
    h2hMatrix[a] = {};
    h2hOwners.forEach(b => {
      if (a === b) return;
      const ma = DATA.ownerStats[a]?.matchups[b];
      if (ma) {
        h2hMatrix[a][b] = ma.wins - ma.losses;
      }
    });
  });

  const table = el('table', '', '', {style: 'font-size:0.7rem'});
  const thead = el('thead');
  let hr = el('tr');
  hr.appendChild(el('th', '', ''));
  h2hOwners.forEach(o => hr.appendChild(el('th', '', o.split(' ')[0], {title: o, style: 'writing-mode:vertical-lr;text-align:left;min-width:36px'})));
  thead.appendChild(hr);
  table.appendChild(thead);

  const tbody = el('tbody');
  h2hOwners.forEach(a => {
    const tr = el('tr');
    tr.appendChild(el('td', '', `<span style="font-weight:600">${a.split(' ')[0]}</span>`, {title: a}));
    h2hOwners.forEach(b => {
      if (a === b) {
        tr.appendChild(el('td', 'h2h-cell', '—', {style: 'background:var(--surface2)'}));
        return;
      }
      const diff = h2hMatrix[a]?.[b];
      if (diff === undefined) {
        tr.appendChild(el('td', '', '—'));
        return;
      }
      const cls = diff > 0 ? 'h2h-cell pos' : diff < 0 ? 'h2h-cell neg' : 'h2h-cell even';
      const intensity = Math.min(Math.abs(diff) / 20, 1);
      const bg = diff > 0 ? `rgba(34,197,94,${intensity*0.3})` : diff < 0 ? `rgba(239,68,68,${intensity*0.3})` : 'transparent';
      tr.appendChild(el('td', cls, (diff > 0 ? '+' : '') + diff, {style: `background:${bg}`}));
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);

  const tw = el('div', 'h2h-grid');
  tw.appendChild(table);
  wrap.appendChild(tw);

  // Best/Worst rivalries
  wrap.appendChild(el('h3', '', '🔥 Top Rivalries (by total games)', {style: 'margin-top:32px'}));
  const rivalries = [];
  h2hOwners.forEach((a, i) => {
    h2hOwners.forEach((b, j) => {
      if (j <= i) return;
      const ma = DATA.ownerStats[a]?.matchups[b];
      if (ma) {
        const total = ma.wins + ma.losses;
        if (total >= 20) rivalries.push({a, b, wins: ma.wins, losses: ma.losses, total, diff: Math.abs(ma.wins - ma.losses)});
      }
    });
  });
  rivalries.sort((a,b) => b.total - a.total);
  const rivRows = rivalries.slice(0,15).map(r => {
    const leader = r.wins > r.losses ? r.a : r.b;
    const trail = r.wins > r.losses ? r.b : r.a;
    const lw = r.wins > r.losses ? r.wins : r.losses;
    const tlw = r.wins > r.losses ? r.losses : r.wins;
    return `<tr><td>${leader} vs ${trail}</td><td>${r.total}</td><td class="w">${lw}</td><td class="l">${tlw}</td><td>${r.diff}</td></tr>`;
  });
  wrap.appendChild(makeTable(['Matchup', 'Games', 'Leader W', 'Leader L', 'Gap'], rivRows));

  sec.appendChild(wrap);
}

// ─── RECORDS ───
function renderRecords() {
  const sec = document.getElementById('records');
  sec.innerHTML = '';
  const wrap = el('section');
  wrap.appendChild(el('h2', '', '🏅 All-Time Records & Superlatives'));
  wrap.appendChild(el('p', 'section-desc', 'Career stats, streaks, and extremes across all 15 seasons.'));

  // Career table
  wrap.appendChild(el('h3', '', 'Career Standings'));
  const careerRows = owners.map(o => {
    const s = DATA.ownerStats[o];
    const total = s.wins + s.losses;
    const wpct = pct(s.wins, s.losses);
    const avgPF = total > 0 ? s.pf / total : 0;
    const avgPA = total > 0 ? s.pa / total : 0;
    const titles = DATA.championships[o] ? DATA.championships[o].length : 0;
    const titleYears = DATA.championships[o] ? DATA.championships[o].join(', ') : '—';
    return `<tr><td><span style="color:${ownerColors[o]};font-weight:600">${o}</span></td><td class="w">${s.wins}</td><td class="l">${s.losses}</td><td>${total}</td><td>${wpct}%</td><td>${fmt(avgPF)}</td><td>${fmt(avgPA)}</td><td>${titles > 0 ? '🏆×' + titles : '—'}</td><td>${titleYears}</td></tr>`;
  });
  wrap.appendChild(makeTable(['Owner', 'W', 'L', 'Games', 'Win%', 'Avg PF', 'Avg PA', 'Titles', 'Years'], careerRows));

  // Single-season records
  wrap.appendChild(el('h3', '', '📈 Single-Season Records', {style: 'margin-top:32px'}));
  const seasonRecords = [];
  allYears.forEach(y => {
    if (y === 2021) return;
    const ys = DATA.standingsByYear[y];
    if (!ys) return;
    ys.forEach(s => {
      seasonRecords.push({year: y, owner: s.owner, team: s.t, w: s.w, l: s.l, pf: s.pf, pa: s.pa});
    });
  });
  const bestW = seasonRecords.reduce((a,b) => a.w > b.w ? a : b);
  const worstL = seasonRecords.reduce((a,b) => a.l > b.l ? a : b);
  const bestPF = seasonRecords.reduce((a,b) => a.pf > b.pf ? a : b);
  const worstPF = seasonRecords.reduce((a,b) => a.pf < b.pf ? a : b);

  const recordGrid = el('div', 'grid grid-2', '', {style: 'margin-top:16px'});
  recordGrid.innerHTML = `
    <div class="card"><h3>Most Wins (Season)</h3><div class="stat w">${bestW.w}</div><div class="stat-label">${bestW.owner} — ${bestW.year} (${bestW.team})</div></div>
    <div class="card"><h3>Most Losses (Season)</h3><div class="stat l">${worstL.l}</div><div class="stat-label">${worstL.owner} — ${worstL.year} (${worstL.team})</div></div>
    <div class="card"><h3>Highest PF (Season)</h3><div class="stat" style="color:var(--win)">${fmt(bestPF.pf)}</div><div class="stat-label">${bestPF.owner} — ${bestPF.year} (${bestPF.team})</div></div>
    <div class="card"><h3>Lowest PF (Season)</h3><div class="stat" style="color:var(--loss)">${fmt(worstPF.pf)}</div><div class="stat-label">${worstPF.owner} — ${worstPF.year} (${worstPF.team})</div></div>
  `;
  wrap.appendChild(recordGrid);

  // Single-week records
  wrap.appendChild(el('h3', '', '💥 Single-Week Records', {style: 'margin-top:32px'}));
  const bestWeek = DATA.h2h.reduce((a,b) => (b.s||0) > (a.s||0) ? b : a);
  const worstWeek = DATA.h2h.reduce((a,b) => (b.s||0) < (a.s||0) ? b : a);
  const biggestBlowout = DATA.h2h.reduce((a,b) => {
    const da = Math.abs((a.s||0) - (a.os||0));
    const db = Math.abs((b.s||0) - (b.os||0));
    return db > da ? b : a;
  });

  const weekGrid = el('div', 'grid grid-3', '', {style: 'margin-top:16px'});
  weekGrid.innerHTML = `
    <div class="card"><h3>Highest Score</h3><div class="stat" style="color:var(--win)">${fmt(bestWeek.s)}</div><div class="stat-label">${bestWeek.on} — Wk ${bestWeek.w}, ${bestWeek.y}</div></div>
    <div class="card"><h3>Lowest Score</h3><div class="stat" style="color:var(--loss)">${fmt(worstWeek.s)}</div><div class="stat-label">${worstWeek.on} — Wk ${worstWeek.w}, ${worstWeek.y}</div></div>
    <div class="card"><h3>Biggest Blowout</h3><div class="stat" style="color:var(--accent2)">${fmt(Math.abs(biggestBlowout.s - biggestBlowout.os))}</div><div class="stat-label">${biggestBlowout.on} over ${biggestBlowout.oon} — Wk ${biggestBlowout.w}, ${biggestBlowout.y}</div></div>
  `;
  wrap.appendChild(weekGrid);

  // Win streaks by owner
  wrap.appendChild(el('h3', '', '🔥 Best Win Streaks', {style: 'margin-top:32px'}));
  const streaks = {};
  owners.forEach(o => streaks[o] = {best: 0, worst: 0, current: 0, curType: null});
  const sortedH2H = [...DATA.h2h].sort((a,b) => a.y - b.y || a.w - b.w || a.on.localeCompare(b.on));
  // Re-sort properly: by year, then week
  sortedH2H.sort((a,b) => {
    if (a.y !== b.y) return a.y - b.y;
    return a.w - b.w;
  });

  // Compute streaks per owner by going through their games in chronological order
  owners.forEach(o => {
    const games = sortedH2H.filter(m => m.on === o).map(m => m.r === 'Win' ? 1 : -1);
    let maxWin = 0, maxLoss = 0, curWin = 0, curLoss = 0;
    games.forEach(g => {
      if (g === 1) { curWin++; curLoss = 0; maxWin = Math.max(maxWin, curWin); }
      else { curLoss++; curWin = 0; maxLoss = Math.max(maxLoss, curLoss); }
    });
    streaks[o].best = maxWin;
    streaks[o].worst = maxLoss;
  });

  const streakRows = owners.map(o => {
    const s = streaks[o];
    return `<tr><td><span style="color:${ownerColors[o]};font-weight:600">${o}</span></td><td class="w">${s.best}</td><td class="l">${s.worst}</td></tr>`;
  });
  wrap.appendChild(makeTable(['Owner', 'Best Win Streak', 'Worst Loss Streak'], streakRows));

  sec.appendChild(wrap);
}

// ─── TABLE HELPER ───
function makeTable(headers, rows) {
  const tw = el('div', 'scroll-table');
  tw.innerHTML = `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r => `<tr>${Array.isArray(r) ? r.map(c => `<td>${c}</td>`).join('') : r}</tr>`).join('')}</tbody></table>`;
  return tw;
}

// ─── NAV ───
function setupNav() {
  document.querySelectorAll('nav a').forEach(a => {
    a.addEventListener('click', e => {
      document.querySelectorAll('nav a').forEach(x => x.classList.remove('active'));
      a.classList.add('active');
    });
  });
  // Intersection observer for active nav
  const sections = document.querySelectorAll('.container');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id;
        document.querySelectorAll('nav a').forEach(a => {
          a.classList.toggle('active', a.getAttribute('href') === '#' + id);
        });
      }
    });
  }, {threshold: 0.3});
  sections.forEach(s => observer.observe(s));
}

function init() {
  renderOverview();
  renderTimeline();
  renderStandings();
  renderH2H();
  renderDrafts();
  renderRecords();
  setupNav();
}

init();
</script>
